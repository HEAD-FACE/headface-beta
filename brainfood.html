<!DOCTYPE html>
<html lang="th" data-theme="dark" data-style="glass">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Brain Food – HEAD FACE</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700;800&family=Sarabun:wght@300;400;500;600&display=swap" rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            obsidianBg: '#080c10',
            sageTeal: '#4ecdc4',
          }
        }
      }
    }
  </script>

  <style>
    /* ═══════════════════════════════════════════
       3006 Design System — Integrated Theme
       ═══════════════════════════════════════════ */
    :root {
      --bg0: #080c10;
      --bg1: #0d1117;
      --bg2: #111820;
      --sur: #161e2a;
      --card: #1a2232;
      --card2: #1f2838;
      --bdr: rgba(120,160,200,.12);
      --bdr2: rgba(120,160,200,.22);

      --ac: #4ecdc4;
      --ac2: #a8e6df;
      --ac3: #2ba89f;
      --acg: linear-gradient(135deg, #4ecdc4, #2ba89f);

      --tx: #e8f0fe;
      --tx2: #9ab0cc;
      --tx3: #5a7a99;
      --white: #fff;

      --glass: rgba(13, 17, 23, 0.72);
      --glass2: rgba(22, 30, 42, 0.85);
      --blur: 16px;

      --r: 16px;
      --r2: 12px;
      --r3: 24px;

      --t: .22s cubic-bezier(.4,0,.2,1);
      --ts: .15s cubic-bezier(.4,0,.2,1);
    }

    body {
      font-family: 'Sarabun', sans-serif;
      background: var(--bg0);
      color: var(--tx);
      min-height: 100vh;
      line-height: 1.6;
    }

    /* ── FLOATING NAVBAR ─── */
    #navbar {
      backdrop-filter: blur(var(--blur)) saturate(180%);
      border: 1px solid var(--bdr2);
      box-shadow: 0 8px 32px rgba(0,0,0,.35);
    }

    .nav-logo {
      font-family: 'Prompt', sans-serif;
      background: var(--acg);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    /* ── LIBRARY LAYOUT ─── */
    .lib-page {
      max-width: 1100px;
      margin: 0 auto;
      padding: 100px 16px 80px;
    }

    .lib-header h1 {
      font-family: 'Prompt', sans-serif;
      background: var(--acg);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .subject-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 12px;
    }

    .subj-card {
      background: rgba(26,34,50,.5);
      backdrop-filter: blur(8px);
      border: 1px solid var(--bdr);
      border-radius: var(--r);
      padding: 20px 16px 16px;
      text-align: center;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: transform var(--t), border-color var(--t), box-shadow var(--t);
    }

    .subj-card::before {
      content: '';
      position: absolute;
      inset: 0 bottom auto;
      height: 3px;
      background: var(--acg);
      opacity: .4;
      transition: opacity var(--ts);
    }

    .subj-card:hover, .subj-card.active {
      transform: translateY(-4px);
      border-color: var(--ac);
      box-shadow: 0 16px 32px rgba(0,0,0,.4), 0 0 0 1px rgba(78,205,196,.1);
    }

    .subj-card:hover::before, .subj-card.active::before {
      opacity: 1;
    }

    .subj-icon {
      font-size: 2.2rem;
      margin-bottom: 8px;
      filter: drop-shadow(0 2px 6px rgba(0,0,0,.4));
    }

    .subj-name {
      font-family: 'Prompt', sans-serif;
      font-size: .9rem;
      font-weight: 700;
      color: var(--tx);
    }

    /* ── MAP CONTAINER ─── */
    .chapter-box {
      background: var(--card);
      border: 1px solid var(--bdr);
      border-radius: var(--r2);
      padding: 20px;
      margin-bottom: 20px;
      transition: border-color var(--ts);
    }
    .chapter-box:hover {
      border-color: var(--bdr2);
    }

    .chapter-title {
      font-family: 'Prompt', sans-serif;
      color: var(--ac);
      font-size: 1.05rem;
      font-weight: 700;
    }

    .bridge-line {
      width: 32px;
      height: 4px;
      background: var(--bdr2);
      border-radius: 99px;
      transition: background var(--ts);
    }
    .bridge-line.active {
      background: var(--ac);
      box-shadow: 0 0 8px rgba(78,205,196,0.4);
    }
  </style>
</head>

<body>

  <nav id="navbar" class="fixed top-4 left-50 fixed left-1/2 -translate-x-1/2 z-50 flex items-center justify-between bg-neutral-900/72 px-6 py-3 rounded-full w-[calc(100vw-32px)] max-w-[1068px]">
    <div class="nav-logo font-extrabold text-xl tracking-tight">Brain Food</div>
    <a href="home.html" class="text-sm text-slate-400 hover:text-white transition-colors duration-200">กลับหน้าแรก</a>
  </nav>

  <main class="lib-page">
    
    <div class="lib-header text-center mb-10">
      <h1 class="text-4xl md:text-5xl font-extrabold tracking-tight">คลังอาหารสมอง</h1>
      <p class="text-slate-400 font-light mt-2 text-sm md:text-base">เลือกรายวิชาด้านล่างเพื่อเข้าสู่แผนที่การเรียนรู้และทำแบบทดสอบ</p>
    </div>

    <section class="mb-12">
      <div id="subjectGrid" class="subject-grid">
        </div>
    </section>

    <section class="mt-8">
      <div class="flex items-center gap-2 mb-6">
        <div class="w-1.5 h-5 bg-gradient-to-b from-[#4ecdc4] to-[#2ba89f] rounded-full"></div>
        <h2 class="font-['Prompt'] font-semibold text-lg text-slate-200 tracking-wide">แผนที่ด่านแบบทดสอบ (Quiz Map)</h2>
      </div>
      <div id="mapArea" class="space-y-4">
        </div>
    </section>

  </main>

  <template id="tpl-part">
    <div class="flex flex-col items-center gap-2 group">
      <div class="relative p-1 rounded-xl bg-slate-900/40 border border-slate-800 transition-all duration-300 group-hover:border-teal-500/30 group-hover:bg-slate-900/80">
        <img class="w-16 h-16 object-contain transition-all duration-300" />
      </div>
      <span class="text-xs text-center text-slate-400 font-mono tracking-wide group-hover:text-teal-300 transition-colors"></span>
    </div>
  </template>

  <template id="tpl-bridge">
    <div class="bridge-line"></div>
  </template>


  <script>
  
  /************* ค่าคงที่ & ข้อมูลระบบ *************/
  const apiUrl      = 'https://script.google.com/macros/s/AKfycbxQyMf_zMNuZoa_JLqa2S5LJYgxd1HwDfnMw-3_FtMH-mN2Db72O4xfqpU17zg2mebPkw/exec';
  const dishPending = 'https://i.postimg.cc/9Q00g2DS/image.png';         // ยังไม่ทำ
  const dishDoneSet = [                                                  // ทำแล้ว (สุ่ม)
    'https://i.postimg.cc/B6YW7jXP/3-20250705-150354-0000.png',
    'https://i.postimg.cc/DybV5yFm/4-20250705-150354-0001.png',
    'https://i.postimg.cc/tJwKy8dX/5-20250705-150354-0002.png',
    'https://i.postimg.cc/mZnfQ1v0/6-20250705-150355-0003.png',
    'https://i.postimg.cc/cCrppdn9/7-20250705-150355-0004.png',
    'https://i.postimg.cc/PxFcz0Rm/20250705-150648-0000.png'
  ];
  const user = JSON.parse(localStorage.getItem("user")) || {};
  const userNo = user.no || '17';   // เลขที่ผู้ใช้

  /* รายชื่อวิชา: [รหัส, ป้ายที่แสดง, อีโมจิไอคอน] */
  const subjects = [
    ['ST','วิทย์','🧪'],       ['MT','คณิต','📐'],       ['ET','อังกฤษ','🌐'],     ['TH','ไทย','🇹🇭'],
    ['SC','สังคม','🌏'],      ['HS','ประวัติศาสตร์','📜'],['CH','จีน','🇨🇳'],        ['EN','ENS','🇬🇧'],
    ['ME','คณิตสากล','🧮'],   ['SE','วิทย์สากล','🚀'],   ['SR','เทคโนโลยี','🤖'],   ['SW','คอม','💻'],
    ['SD','Web Design','🎨'],['HE','สุขศึกษา','🍎'],    ['PE','พลศึกษา','⚽'],     ['AA','การงาน','🛠️']
  ];

  /************* สร้างตารางการ์ดรายวิชา (Library Grid) *************/
  const grid = document.getElementById('subjectGrid');
  subjects.forEach(([code, label, icon], i) => {
    const card = document.createElement('div');
    card.className = 'subj-card';
    card.dataset.code = code;
    
    card.innerHTML = `
      <div class="subj-icon">${icon}</div>
      <div class="subj-name">${label}</div>
    `;
    
    card.onclick = () => selectSubject(code, card);
    grid.appendChild(card);
  });

  /************* เมื่อคลิกเลือกวิชา *************/
  async function selectSubject(code, cardElement) {
    // ลบสถานะ Active ทั้งหมดออกจากการ์ดอื่น
    document.querySelectorAll('.subj-card').forEach(c => c.classList.remove('active'));
    // เพิ่มสถานะ Active ให้การ์ดที่ถูกเลือก
    cardElement.classList.add('active');

    const mapArea = document.getElementById('mapArea');
    mapArea.innerHTML = `
      <div class="text-center py-12 text-slate-400">
        <div class="animate-spin inline-block w-6 h-6 border-[3px] border-current border-t-transparent text-teal-400 rounded-full mb-2"></div>
        <p class="font-light text-sm">กำลังเปิดคลังข้อมูลแบบทดสอบ...</p>
      </div>
    `;

    try {
      const res = await fetch(`${apiUrl}?action=getPartList&subject=${code}`);
      const data = await res.json();
      renderMap(data.chapters);
    } catch(err) {
      mapArea.innerHTML = '<div class="text-center py-12 text-red-400 bg-red-950/20 border border-red-900/30 rounded-xl font-light text-sm">ไม่สามารถโหลดข้อมูลแผนที่ได้ กรุณาลองใหม่อีกครั้ง</div>';
      console.error(err);
    }
  }

  /************* วาดแผนที่ภารกิจ (Render Quiz Map) *************/
  const tplPart   = document.getElementById('tpl-part').content;
  const tplBridge = document.getElementById('tpl-bridge').content;

  function isDone(val) {
    const list = String(val ?? '').trim().split(/[\s,]+/).filter(Boolean);
    return list.includes(String(userNo));
  }
    
  function renderMap(chapters) {
    const mapArea = document.getElementById('mapArea');
    mapArea.innerHTML = '';
    
    if(!chapters || chapters.length === 0) {
      mapArea.innerHTML = '<div class="text-center py-12 text-slate-500 font-light text-sm bg-slate-900/20 rounded-xl border border-slate-800">ยังไม่มีข้อมูลด่านในวิชานี้</div>';
      return;
    }

    chapters.forEach((chap, idx) => {
      const rawTitle = chap.parts[0]?.content || '';
      const chapterName = rawTitle.split(',')[0].trim() || `เนื้อหาบทที่ ${idx + 1}`;

      // กล่อง Container สำหรับครอบแต่ละบทสไตล์ Obsidian
      const chapterBox = document.createElement('div');
      chapterBox.className = 'chapter-box';

      // หัวข้อประจำบท
      const h3 = document.createElement('h3');
      h3.className = 'chapter-title mb-4 font-medium flex items-center gap-2';
      h3.innerHTML = `<span class="text-xs bg-teal-500/10 text-teal-400 border border-teal-500/20 px-2 py-0.5 rounded-md font-mono">CH ${idx + 1}</span> ${chapterName}`;
      chapterBox.appendChild(h3);

      // แถวเส้นทางเดินจาน (Dish Nodes Flex-row)
      const row = document.createElement('div');
      row.className = 'flex items-center gap-4 flex-wrap mt-2 pl-2';
      chapterBox.appendChild(row);

      // เรียงและสร้างจานภารกิจย่อย (Parts)
      chap.parts.sort((a,b) => a.part_no - b.part_no).forEach((p, i) => {
        const node = tplPart.cloneNode(true);
        const img = node.querySelector('img');
        const cap = node.querySelector('span');

        const done = isDone(p.done_no);
        img.src = done ? randomDoneImg() : dishPending;
        img.classList.toggle('opacity-40', !done);
        cap.textContent = `Part ${p.part_no}`;

        // ตรวจสอบกฎการเล่น: ต้องทำเสร็จ หรือเป็นจานแรก หรือทำจานก่อนหน้าเสร็จแล้ว
        const canPlay = done || i === 0 || prevDone(chap.parts, i);
        if (canPlay) {
          img.classList.add('cursor-pointer', 'hover:scale-110', 'active:scale-95');
          img.onclick = () => startQuiz(chap.subject_id, p.part_no, done);
        } else {
          img.classList.add('cursor-not-allowed');
        }

        row.appendChild(node);
        
        // สร้างเส้นสะพานเชื่อมระหว่างจานย่อย
        if (i < chap.parts.length - 1) {
          const bridgeNode = tplBridge.cloneNode(true);
          const bridgeLine = bridgeNode.querySelector('.bridge-line');
          if(done) bridgeLine.classList.add('active'); // ถ้าด่านนั้นเสร็จแล้ว ให้เส้นสว่างเป็นสีทีม
          row.appendChild(bridgeNode);
        }
      });

      mapArea.appendChild(chapterBox);
    });
  }

  /* สุ่มภาพจานอาหารที่ทำสำเร็จ */
  function randomDoneImg() {
    return dishDoneSet[Math.floor(Math.random() * dishDoneSet.length)];
  }

  /* ตรวจสอบว่าภารกิจก่อนหน้าผ่านหรือยัง */
  function prevDone(parts, index) {
    if (index === 0) return true;
    const prev = parts[index - 1];
    const list = (prev.done_no ?? '').trim().split(/\s+/).filter(Boolean);
    return list.includes(String(userNo));
  }

  /* ทำหน้าที่นำทางไปห้องทําแบบทดสอบ (Quiz.html) */
  function startQuiz(subjectId, partNo, done) {
    localStorage.setItem('subjectId', subjectId);
    localStorage.setItem('partNo', partNo);
    localStorage.setItem('alreadyDone', done);
    window.location.href = 'quiz.html';
  }

  // เริ่มต้นโดยการดึงและคลิกวิชาแรก (วิทย์ - ST) ทันทีตอนโหลดหน้าเว็บ
  window.addEventListener('DOMContentLoaded', () => {
    const firstCard = grid.querySelector('.subj-card');
    if (firstCard) {
      selectSubject(subjects[0][0], firstCard);
    }
  });
  </script>
</body>
</html>
