<!DOCTYPE html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>เข้าสู่ระบบ - HEAD06</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      body {
        font-family: 'Sarabun', sans-serif;
      }
    </style>
  </head>
  <body class="bg-gradient-to-tr from-slate-900 via-blue-900 to-slate-900 min-h-screen flex items-center justify-center p-4 relative overflow-hidden">
    
    <div class="absolute top-[-10%] left-[-10%] w-72 h-72 bg-blue-500 rounded-full mix-blend-multiply filter blur-3xl opacity-20 animate-pulse"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-72 h-72 bg-indigo-500 rounded-full mix-blend-multiply filter blur-3xl opacity-20 animate-pulse delay-700"></div>

    <div id="loading-screen" class="fixed inset-0 bg-slate-950/60 backdrop-blur-md z-50 flex flex-col items-center justify-center hidden transition-all duration-300">
      <div class="relative flex items-center justify-center">
        <div class="animate-spin rounded-full h-16 w-16 border-4 border-blue-500/30 border-t-blue-500"></div>
      </div>
      <p class="text-blue-400 mt-4 font-medium tracking-wide animate-pulse">กำลังตรวจสอบข้อมูล...</p>
    </div>

    <div class="bg-white/95 backdrop-blur-lg shadow-2xl rounded-2xl p-8 w-full max-w-md transform transition-all border border-white/20">
      
      <div class="text-center mb-8">
        <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-gradient-to-br from-blue-500 to-indigo-600 text-white text-2xl font-bold shadow-lg shadow-blue-500/30 mb-4 tracking-wider">
          H06
        </div>
        <h1 class="text-3xl font-extrabold text-slate-800 tracking-tight">เข้าสู่ระบบ</h1>
        <p class="text-sm text-slate-500 mt-1">ยินดีต้อนรับสู่ระบบจัดการ <span class="text-blue-600 font-semibold">HEAD06</span></p>
      </div>

      <form id="login-form" class="space-y-5">
        <div>
          <label for="no" class="block text-slate-700 font-medium text-sm mb-2">เลขที่</label>
          <div class="relative">
            <input
              type="number"
              id="no"
              placeholder="ตัวอย่าง: 1"
              class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent focus:bg-white transition-all text-slate-800 placeholder-slate-400"
              required
            />
          </div>
        </div>

        <div>
          <label for="studentId" class="block text-slate-700 font-medium text-sm mb-2">เลขประจำตัว</label>
          <div class="relative">
            <input
              type="number"
              id="studentId"
              placeholder="ตัวอย่าง: 12345"
              class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent focus:bg-white transition-all text-slate-800 placeholder-slate-400"
              required
            />
          </div>
        </div>

        <div class="pt-2">
          <button
            type="submit"
            class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 text-white py-3 px-4 rounded-xl font-semibold shadow-lg shadow-blue-500/20 active:scale-[0.98] transition-all duration-150 text-center block"
          >
            เข้าสู่ระบบ
          </button>
        </div>
      </form>
      
      <div class="mt-8 text-center border-t border-slate-100 pt-4">
        <p class="text-xs text-slate-400">&copy; 2026 HEAD06. All rights reserved.</p>
      </div>
    </div>

    <script>
      // เช็คว่า localStorage มี user อยู่แล้วไหม
      const existingUser = localStorage.getItem("user");
      if (existingUser) {
        window.location.href = "home.html";
      }

      const form = document.getElementById("login-form");
      const loadingScreen = document.getElementById("loading-screen");

      form.addEventListener("submit", async (e) => {
        e.preventDefault();

        const no = document.getElementById("no").value;
        const studentId = document.getElementById("studentId").value;

        loadingScreen.classList.remove("hidden");

        try {
          const url = `https://script.google.com/macros/s/AKfycbxQyMf_zMNuZoa_JLqa2S5LJYgxd1HwDfnMw-3_FtMH-mN2Db72O4xfqpU17zg2mebPkw/exec?action=login&no=${no}&studentId=${studentId}`;
          const res = await fetch(url);
          const data = await res.json();

          if (data.status === "success") {
            localStorage.setItem("user", JSON.stringify(data.user));
            window.location.href = "home.html";
          } else {
            alert("ไม่พบข้อมูลผู้ใช้ กรุณาตรวจสอบอีกครั้ง");
          }
        } catch (err) {
          alert("เกิดข้อผิดพลาดในการเชื่อมต่อ");
          console.error(err);
        } finally {
          loadingScreen.classList.add("hidden");
        }
      });
    </script>
  </body>
</html>
